    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://weybre.ai/#org",
          "name": "Weybre AI",
          "url": "https://weybre.ai/",
          "logo": "https://storage.googleapis.com/gpt-engineer-file-uploads/7cBWNISX2BgfOQEfC4E8hvA6wRi1/social-images/social-1779170648691-Logo.webp",
          "description": "AI co-counsel and research engine for Indian lawyers.",
          "areaServed": "IN",
          "knowsLanguage": ["en", "hi"]
        },
        {
          "@type": "WebSite",
          "@id": "https://weybre.ai/#website",
          "url": "https://weybre.ai/",
          "name": "Weybre AI",
          "publisher": { "@id": "https://weybre.ai/#org" },
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://weybre.ai/app/research?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Weybre AI",
          "applicationCategory": "LegalService",
          "operatingSystem": "Web",
          "description": "AI legal research with Supreme Court case-law search, cited web answers, draft assist and diligence.",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
          "publisher": { "@id": "https://weybre.ai/#org" }
        }
      ]
    }
